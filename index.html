<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OS Multiplayer Game</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #f0f0f0; }
        canvas { display: block; }
        #joystick-zone {
            position: absolute; bottom: 20px; left: 20px;
            width: 150px; height: 150px;
            display: none; /* ซ่อนใน PC, แสดงในมือถือ */
        }
    </style>
    <!-- โหลด Socket.io และ Nipple.js (สำหรับ Joystick) -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="joystick-zone"></div>

    <script>
        const socket = io();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // ปรับขนาด Canvas ให้เต็มจอ
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 1. ฟังก์ชันเช็ค OS
        function detectOS() {
            const userAgent = window.navigator.userAgent;
            const platform = window.navigator.platform;
            const macosPlatforms = ['Macintosh', 'MacIntel', 'MacPPC', 'Mac68K'];
            const windowsPlatforms = ['Win32', 'Win64', 'Windows', 'WinCE'];
            const iosPlatforms = ['iPhone', 'iPad', 'iPod'];
            
            if (macosPlatforms.indexOf(platform) !== -1) return 'macOS';
            if (iosPlatforms.indexOf(platform) !== -1) return 'iOS';
            if (windowsPlatforms.indexOf(platform) !== -1) return 'Windows';
            if (/Android/.test(userAgent)) return 'Android';
            if (/Linux/.test(platform)) return 'Linux';
            return 'Unknown OS';
        }

        const myOS = detectOS();

        // เช็คว่าเป็นมือถือหรือไม่เพื่อเปิด Joystick
        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            document.getElementById('joystick-zone').style.display = 'block';
            const joystick = nipplejs.create({
                zone: document.getElementById('joystick-zone'),
                mode: 'static',
                position: { left: '50%', top: '50%' },
                color: 'blue'
            });

            joystick.on('move', (evt, data) => {
                const speed = 5;
                input.x = Math.cos(data.angle.radian) * speed;
                input.y = Math.sin(data.angle.radian) * -speed; // -speed เพราะแกน Y canvas คว่ำลง
            });
            joystick.on('end', () => { input.x = 0; input.y = 0; });
        }

        // สถานะของผู้เล่น
        const me = { x: 0, y: 0, radius: 25 };
        let players = {};
        
        // ระบบป้อนข้อมูล (WASD)
        const input = { x: 0, y: 0 };
        const keys = { w: false, a: false, s: false, d: false };

        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true;
        });
        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false;
        });

        function updateInput() {
            const speed = 5;
            if (!document.getElementById('joystick-zone').style.display || document.getElementById('joystick-zone').style.display === 'none') {
                input.x = 0; input.y = 0;
                if (keys.w) input.y -= speed;
                if (keys.s) input.y += speed;
                if (keys.a) input.x -= speed;
                if (keys.d) input.x += speed;
            }
        }

        // 2. รับ-ส่งข้อมูลกับ Server
        socket.emit('join', { os: myOS });

        socket.on('currentPlayers', (serverPlayers) => {
            players = serverPlayers;
        });

        socket.on('newPlayer', (playerInfo) => {
            players[playerInfo.id] = playerInfo.player;
        });

        socket.on('playerMoved', (data) => {
            if (players[data.id]) {
                players[data.id].x = data.x;
                players[data.id].y = data.y;
            }
        });

        socket.on('playerDisconnected', (id) => {
            delete players[id];
        });

        // 3. วาดแผนที่ (Grid) แบบไม่มีที่สิ้นสุด
        function drawGrid(cameraX, cameraY) {
            const gridSize = 50;
            const offsetX = cameraX % gridSize;
            const offsetY = cameraY % gridSize;

            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 1;
            
            for (let x = -offsetX; x < canvas.width; x += gridSize) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = -offsetY; y < canvas.height; y += gridSize) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }
        }

        // 4. วาดผู้เล่น
        function drawPlayer(x, y, color, osText, isMe) {
            ctx.beginPath();
            ctx.arc(x, y, me.radius, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 3;
            ctx.stroke();

            // วาดข้อความ OS บนหัว
            ctx.fillStyle = '#000';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(osText, x, y - me.radius - 10);
            
            if(isMe) {
                 ctx.fillStyle = 'blue';
                 ctx.fillText("(You)", x, y - me.radius - 25);
            }
        }

        // 5. Game Loop
        function gameLoop() {
            updateInput();
            
            let oldX = me.x;
            let oldY = me.y;

            me.x += input.x;
            me.y += input.y;

            // ส่งข้อมูลไป Server ถ้ามีการขยับ
            if (oldX !== me.x || oldY !== me.y) {
                socket.emit('playerMovement', { x: me.x, y: me.y });
            }

            // เคลียร์หน้าจอ
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // วาดพื้นหลัง Grid ให้ขยับสวนทางกับผู้เล่น (สร้างภาพลวงตาว่ากล้องล็อก)
            drawGrid(me.x, me.y);

            // จุดศูนย์กลางหน้าจอ (ตำแหน่งของเราเสมอ)
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // วาดผู้เล่นคนอื่น (คำนวณตำแหน่งสัมพัทธ์กับตัวเรา)
            for (let id in players) {
                if (id !== socket.id) {
                    const p = players[id];
                    // ตำแหน่งบนหน้าจอ = กึ่งกลางหน้าจอ + (ตำแหน่งคนอื่น - ตำแหน่งเรา)
                    const drawX = centerX + (p.x - me.x);
                    const drawY = centerY + (p.y - me.y);
                    drawPlayer(drawX, drawY, p.color, p.os, false);
                }
            }

            // วาดตัวเราเองตรงกลางหน้าจอเสมอ
            if(players[socket.id]) {
                drawPlayer(centerX, centerY, players[socket.id].color, myOS, true);
            }

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
