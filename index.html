<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multiplayer OS Game</title>
    <style>
        body { margin: 0; background-color: #111116; color: #fff; font-family: sans-serif; overflow: hidden; user-select: none; }
        
        #game-window { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 1.5px, transparent 1.5px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1.5px, transparent 1.5px);
            background-size: 80px 80px;
            background-position: 0px 0px;
        }
        
        .player { position: absolute; width: 40px; height: 40px; background-color: #7f5af0; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px #7f5af0; }
        .player.remote { background-color: #2cb67d; box-shadow: 0 0 15px #2cb67d; }
        .player.local { left: 50%; top: 50%; z-index: 10; }
        
        .os-tag { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); background-color: rgba(0,0,0,0.8); padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; white-space: nowrap; border: 1px solid #7f5af0; }
        .player.remote .os-tag { border-color: #2cb67d; }
        
        #joystick-zone { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; touch-action: none; z-index: 20; }
        #joystick-stick { width: 50px; height: 50px; background: #7f5af0; border-radius: 50%; position: absolute; top: 35px; left: 35px; pointer-events: none; }

        /* ระบบสไตล์สำหรับแชท */
        #chat-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 300px;
            height: 220px;
            background: rgba(17, 17, 22, 0.85);
            border: 1px solid #7f5af0;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            z-index: 30;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        #chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .chat-msg {
            word-break: break-word;
            line-height: 1.4;
        }
        .chat-msg .os-label {
            font-weight: bold;
            color: #7f5af0;
            margin-right: 5px;
        }
        .chat-msg.remote .os-label {
            color: #2cb67d;
        }
        #chat-input {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-top: 1px solid rgba(127, 90, 240, 0.4);
            padding: 10px;
            color: #fff;
            outline: none;
            font-size: 13px;
        }
        #chat-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-top: 1px solid #7f5af0;
        }

        /* ปรับสเกลแชทเมื่อแสดงผลบนจอขนาดเล็ก */
        @media (max-width: 600px) {
            #chat-container {
                width: 220px;
                height: 150px;
                bottom: 10px;
                right: 10px;
            }
            #joystick-zone {
                bottom: 20px;
                left: 20px;
            }
        }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div id="game-window">
    <div id="joystick-zone"><div id="joystick-stick"></div></div>
    
    <!-- แทรกกล่องข้อความสนทนา -->
    <div id="chat-container">
        <div id="chat-messages"></div>
        <input type="text" id="chat-input" placeholder="กด Enter เพื่อพิมพ์คุยกัน..." autocomplete="off">
    </div>
</div>

<script>
    const socket = io();
    const gameWindow = document.getElementById('game-window');
    const joystickZone = document.getElementById('joystick-zone');
    const joystickStick = document.getElementById('joystick-stick');
    const chatContainer = document.getElementById('chat-container');
    const chatMessages = document.getElementById('chat-messages');
    const chatInput = document.getElementById('chat-input');

    let localPlayer = { x: 0, y: 0 }; 
    let remotePlayers = {}; 
    let keys = {};
    let joystickInput = { x: 0, y: 0 };
    let isDragging = false;
    let isTyping = false; // ตัวแปรสถานะว่าผู้เล่นกำลังเปิดหน้าต่างพิมพ์แชทอยู่หรือไม่
    const speed = 5;

    function detectOS() {
        const ua = navigator.userAgent;
        if (/android/i.test(ua)) return 'Android';
        if (/iPad|iPhone|iPod/.test(ua)) return 'iOS';
        if (/Macintosh|MacIntel/.test(ua)) return 'Mac OS';
        if (/Win32|Win64|Windows/.test(ua)) return 'Windows';
        if (/Linux/.test(ua)) return 'Linux';
        return 'Unknown OS';
    }

    // ตัวช่วยป้องกันการโจมตีทางสคริปต์ (Prevent XSS)
    function escapeHTML(text) {
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return text.replace(/[&<>"']/g, (m) => map[m]);
    }

    socket.on('connect', () => {
        socket.emit('initOS', detectOS());
    });

    socket.on('updatePlayers', (serverPlayers) => {
        Object.keys(serverPlayers).forEach((id) => {
            if (id !== socket.id) {
                if (!remotePlayers[id]) {
                    remotePlayers[id] = {
                        x: serverPlayers[id].x,
                        y: serverPlayers[id].y,
                        el: createPlayerDOM(serverPlayers[id].os)
                    };
                } else {
                    remotePlayers[id].x = serverPlayers[id].x;
                    remotePlayers[id].y = serverPlayers[id].y;
                }
            }
        });
    });

    socket.on('playerMoved', (data) => {
        if (remotePlayers[data.id]) {
            remotePlayers[data.id].x = data.x;
            remotePlayers[data.id].y = data.y;
        }
    });

    socket.on('playerDisconnected', (id) => {
        if (remotePlayers[id]) {
            remotePlayers[id].el.remove();
            delete remotePlayers[id];
        }
    });

    // ฟังการแจ้งเตือนจากระบบเซิร์ฟเวอร์เมื่อมีข้อความแชทส่งเข้ามาใหม่
    socket.on('newMessage', (data) => {
        const messageDiv = document.createElement('div');
        const isMe = data.id === socket.id;
        
        messageDiv.className = `chat-msg ${isMe ? 'local' : 'remote'}`;
        messageDiv.innerHTML = `<span class="os-label">[${data.os}]</span>: ${escapeHTML(data.text)}`;
        
        chatMessages.appendChild(messageDiv);
        
        // เลื่อนตำแหน่งการเลื่อน (Scroll) ไปยังข้อความล่าสุดโดยอัตโนมัติ
        chatMessages.scrollTop = chatMessages.scrollHeight;
    });

    function createPlayerDOM(os) {
        const el = document.createElement('div');
        el.className = 'player remote';
        el.innerHTML = `<div class="os-tag">${os}</div>`;
        gameWindow.appendChild(el);
        return el;
    }

    const myEl = document.createElement('div');
    myEl.className = 'player local';
    myEl.innerHTML = `<div class="os-tag">${detectOS()}</div>`;
    gameWindow.appendChild(myEl);

    if (!/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
        joystickZone.style.display = 'none';
    }

    // จัดการสลับค่าสถานะ typing เพื่อหยุดแป้นเคลื่อนไหวของเกมขณะพิมพ์ข้อความ
    chatInput.addEventListener('focus', () => { isTyping = true; });
    chatInput.addEventListener('blur', () => { isTyping = false; });

    window.addEventListener('keydown', (e) => { 
        if (isTyping) return;
        keys[e.key.toLowerCase()] = true; 
    });
    window.addEventListener('keyup', (e) => { 
        if (isTyping) return;
        keys[e.key.toLowerCase()] = false; 
    });

    // การส่งข้อความเมื่อทำการเคาะปุ่ม "Enter"
    chatInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const message = chatInput.value.trim();
            if (message !== '') {
                socket.emit('sendMessage', message);
                chatInput.value = '';
            }
            chatInput.blur(); // นำโฟกัสออกจากช่องป้อนข้อมูลเพื่อให้กลับมาขยับตัวละครได้ทันที
        }
    });

    joystickZone.addEventListener('touchstart', (e) => { isDragging = true; handleJoystick(e); });
    window.addEventListener('touchmove', (e) => { if (isDragging) handleJoystick(e); }, { passive: false });
    window.addEventListener('touchend', () => {
        isDragging = false;
        joystickStick.style.transform = 'translate(0px, 0px)';
        joystickInput = { x: 0, y: 0 };
    });

    function handleJoystick(e) {
        e.preventDefault();
        const touch = e.touches[0];
        const rect = joystickZone.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        let deltaX = touch.clientX - centerX;
        let deltaY = touch.clientY - centerY;
        const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
        const maxRadius = rect.width / 2;

        if (distance > maxRadius) {
            deltaX = (deltaX / distance) * maxRadius;
            deltaY = (deltaY / distance) * maxRadius;
        }
        joystickStick.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
        joystickInput.x = deltaX / maxRadius;
        joystickInput.y = deltaY / maxRadius;
    }

    function update() {
        let moved = false;
        
        // เพิ่มเงื่อนไขว่าต้องไม่มีการแชทอยู่ จึงจะยอมรับค่าแป้นควบคุม
        if (!isTyping) {
            if (keys['w'] || keys['arrowup']) { localPlayer.y -= speed; moved = true; }
            if (keys['s'] || keys['arrowdown']) { localPlayer.y += speed; moved = true; }
            if (keys['a'] || keys['arrowleft']) { localPlayer.x -= speed; moved = true; }
            if (keys['d'] || keys['arrowright']) { localPlayer.x += speed; moved = true; }
        }

        if (joystickInput.x !== 0 || joystickInput.y !== 0) {
            localPlayer.x += joystickInput.x * speed;
            localPlayer.y += joystickInput.y * speed;
            moved = true;
        }

        if (moved) {
            socket.emit('move', { x: localPlayer.x, y: localPlayer.y });
        }

        gameWindow.style.backgroundPosition = `${-localPlayer.x}px ${-localPlayer.y}px`;

        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;

        Object.keys(remotePlayers).forEach((id) => {
            const rp = remotePlayers[id];
            const screenX = centerX + (rp.x - localPlayer.x);
            const screenY = centerY + (rp.y - localPlayer.y);
            
            rp.el.style.left = screenX + 'px';
            rp.el.style.top = screenY + 'px';
        });

        requestAnimationFrame(update);
    }
    requestAnimationFrame(update);
</script>
</body>
</html>
