<!DOCTYPE html>
<html>
<body>
<canvas id="game"></canvas>
<script src="/socket.io/socket.io.js"></script>
<script>
const os = navigator.platform;
const socket = io({ query: { os } });
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let players = {};
let pos = { x: 0, y: 0 };

window.addEventListener('keydown', (e) => {
  if (e.key === 'w') pos.y -= 5;
  if (e.key === 's') pos.y += 5;
  if (e.key === 'a') pos.x -= 5;
  if (e.key === 'd') pos.x += 5;
  socket.emit('move', pos);
});

socket.on('update', (data) => {
  players = data;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let id in players) {
    const p = players[id];
    ctx.beginPath();
    ctx.arc(p.x - pos.x + 400, p.y - pos.y + 300, 20, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillText(p.os, p.x - pos.x + 400, p.y - pos.y + 270);
  }
});
</script>
</body>
</html>
