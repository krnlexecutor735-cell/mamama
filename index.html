<!DOCTYPE html>
<html>
<body style="margin:0; overflow:hidden;">
<canvas id="game"></canvas>
<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io({ query: { os: navigator.platform } });
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let players = {};
let myPos = { x: 0, y: 0 };

window.addEventListener('keydown', (e) => {
    if (e.key === 'w') myPos.y -= 10;
    if (e.key === 's') myPos.y += 10;
    if (e.key === 'a') myPos.x -= 10;
    if (e.key === 'd') myPos.x += 10;
    socket.emit('move', myPos);
});

socket.on('update', (serverPlayers) => {
    players = serverPlayers;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    for (let id in players) {
        let p = players[id];
        let drawX = (p.x - myPos.x) + (canvas.width / 2);
        let drawY = (p.y - myPos.y) + (canvas.height / 2);
        
        ctx.beginPath();
        ctx.arc(drawX, drawY, 20, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillText(p.os, drawX - 10, drawY - 30);
    }
});
</script>
</body>
</html>
