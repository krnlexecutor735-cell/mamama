<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shared Space</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-main: #09090b;
            --panel-bg: #18181b;
            --panel-border: #27272a;
            --text-main: #f4f4f5;
            --text-muted: #71717a;
            --blue-accent: #2563eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #login-screen {
            background: var(--panel-bg);
            padding: 32px;
            border-radius: 16px;
            border: 1px solid var(--panel-border);
            width: 90%;
            max-width: 380px;
            z-index: 10;
        }

        #login-screen h2 {
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 1.4rem;
        }

        #login-screen input {
            padding: 12px 16px;
            width: 100%;
            margin-top: 16px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid var(--panel-border);
            background-color: var(--bg-main);
            color: white;
            font-size: 0.95rem;
            outline: none;
        }

        #login-screen button {
            width: 100%;
            padding: 12px;
            background-color: var(--text-main);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: var(--bg-main);
            font-weight: 600;
            font-size: 0.95rem;
        }

        #app-container {
            display: none;
            width: 100vw;
            height: 100dvh;
            flex-direction: column;
            position: relative;
        }

        .chat-header {
            height: 64px;
            padding: 0 20px;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h3 {
            font-size: 1rem;
            font-weight: 600;
        }

        .status-badge {
            background-color: rgba(239, 68, 68, 0.2);
            color: #f87171;
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 99px;
            display: none;
        }

        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .messages-container::-webkit-scrollbar {
            width: 4px;
        }
        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .messages-container::-webkit-scrollbar-thumb {
            background: var(--panel-border);
            border-radius: 10px;
        }

        .message-bubble {
            background: var(--panel-bg);
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 75%;
            align-self: flex-start;
            border: 1px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .message-bubble.me {
            background: rgba(255, 255, 255, 0.02);
            align-self: flex-end;
        }

        .message-header {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .message-content {
            word-break: break-word;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .message-content a {
            color: var(--blue-accent);
            text-decoration: none;
        }

        .message-content code {
            background-color: rgba(255, 255, 255, 0.05);
            padding: 2px 4px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.85em;
        }

        .message-content pre {
            background-color: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 6px 0;
            border: 1px solid var(--panel-border);
        }

        .bubble-actions {
            display: flex;
            gap: 6px;
            align-self: flex-end;
            margin-top: 2px;
        }

        .action-icon-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 2px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-icon-btn:hover {
            color: var(--text-main);
        }

        .attachment-preview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            margin-top: 4px;
            border: 1px solid var(--panel-border);
            object-fit: cover;
        }

        .file-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background-color: rgba(255, 255, 255, 0.02);
            padding: 8px 12px;
            border-radius: 8px;
            margin-top: 4px;
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.8rem;
            border: 1px solid var(--panel-border);
        }

        .chat-input-bar {
            background: var(--panel-bg);
            border-top: 1px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            padding: 14px 20px;
            z-index: 5;
        }

        .staged-preview-container {
            display: none;
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 10px;
            align-items: center;
            justify-content: space-between;
        }

        .staged-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
        }

        .staged-thumbnail {
            width: 36px;
            height: 36px;
            border-radius: 4px;
            object-fit: cover;
            border: 1px solid var(--panel-border);
        }

        .progress-bar-outer {
            display: none;
            width: 100%;
            height: 4px;
            background-color: var(--panel-border);
            border-radius: 2px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .progress-bar-inner {
            width: 0%;
            height: 100%;
            background-color: var(--text-main);
            transition: width 0.1s linear;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-wrapper {
            flex-grow: 1;
            background-color: var(--bg-main);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 2px 10px;
        }

        .input-box {
            flex-grow: 1;
            background: none;
            border: none;
            padding: 8px 4px;
            color: white;
            font-size: 0.9rem;
            outline: none;
            resize: none;
            max-height: 80px;
        }

        .btn-action {
            background: none;
            border: none;
            border-radius: 8px;
            width: 36px;
            height: 36px;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-action:hover {
            color: var(--text-main);
            background-color: rgba(255, 255, 255, 0.04);
        }

        .btn-send {
            background-color: var(--text-main);
            color: var(--bg-main);
        }

        .btn-send:hover {
            opacity: 0.9;
        }

        #fullscreen-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100dvh;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .fullscreen-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--panel-border);
            color: white;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .fullscreen-content-area {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
        }

        .fullscreen-content-area img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .fullscreen-markdown {
            background-color: var(--panel-bg);
            border: 1px solid var(--panel-border);
            padding: 30px;
            border-radius: 12px;
            max-width: 800px;
            width: 100%;
            max-height: 80%;
            overflow-y: auto;
        }

        .fullscreen-markdown a {
            color: var(--blue-accent);
        }

        .system-notice {
            align-self: center;
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-muted);
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 99px;
            border: 1px solid var(--panel-border);
            margin: 6px 0;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>ระบุชื่อผู้ใช้</h2>
        <p style="font-size: 0.8rem; color: var(--text-muted);">เพื่อจัดระเบียบการจัดส่งข้อความร่วมกัน</p>
        <input type="text" id="username-input" placeholder="พิมพ์ชื่อผู้ใช้ของคุณ..." maxlength="20" onkeypress="handleEnter(event)">
        <button onclick="registerUser()">เชื่อมต่อระบบแชท</button>
    </div>

    <div id="app-container">
        <div class="chat-header">
            <div>
                <h3>ห้องแชทสเปซเรียบง่าย</h3>
                <span id="active-user-name" style="font-size: 0.75rem; color: var(--text-muted);"></span>
            </div>
            <div id="network-alert" class="status-badge">สัญญาณขาดหาย</div>
        </div>
        
        <div class="messages-container" id="chat-messages"></div>

        <div class="chat-input-bar">
            <div class="staged-preview-container" id="staged-container">
                <div class="staged-info">
                    <img id="staged-img-view" class="staged-thumbnail" style="display: none;">
                    <span id="staged-file-name" style="word-break: break-all;"></span>
                </div>
                <button class="action-icon-btn" onclick="clearStagedFile()"><i data-lucide="x"></i></button>
            </div>

            <div class="progress-bar-outer" id="progress-bar-wrap">
                <div class="progress-bar-inner" id="progress-indicator"></div>
            </div>

            <div class="input-row">
                <input type="file" id="file-input" style="display: none;" onchange="handleFileStaging(event)">
                <button class="btn-action" onclick="document.getElementById('file-input').click()"><i data-lucide="plus"></i></button>
                
                <div class="input-wrapper">
                    <textarea class="input-box" id="message-input" rows="1" placeholder="พิมพ์ข้อความ..." onkeydown="handleChatSubmit(event)"></textarea>
                </div>
                
                <button class="btn-action btn-send" onclick="initiateSend()"><i data-lucide="send"></i></button>
            </div>
        </div>
    </div>

    <div id="fullscreen-overlay">
        <button class="fullscreen-close" onclick="closeFullscreen()"><i data-lucide="x"></i></button>
        <div class="fullscreen-content-area" id="fullscreen-viewer"></div>
    </div>

    <script>
        const socket = io();
        let myUsername = '';
        let stagedFileObj = null;

        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });

        socket.on('disconnect', () => {
            document.getElementById('network-alert').style.display = 'block';
            document.getElementById('message-input').disabled = true;
        });

        socket.on('connect', () => {
            document.getElementById('network-alert').style.display = 'none';
            document.getElementById('message-input').disabled = false;
            if (myUsername) {
                socket.emit('check-username', myUsername, (res) => {
                    if (!res.success) {
                        window.location.reload();
                    }
                });
            }
        });

        function handleEnter(e) {
            if (e.key === 'Enter') registerUser();
        }

        function registerUser() {
            const input = document.getElementById('username-input');
            const username = input.value.trim();
            if (!username) return;

            socket.emit('check-username', username, (res) => {
                if (res.success) {
                    myUsername = username;
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('app-container').style.display = 'flex';
                    document.getElementById('active-user-name').innerText = `@${myUsername}`;
                } else {
                    alert('ชื่อนี้ไม่สามารถใช้งานได้');
                }
            });
        }

        function linkify(text) {
            const urlRegex = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
            return text.replace(urlRegex, (url) => {
                return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
            });
        }

        function renderMessage(data) {
            const isMe = data.sender === myUsername;
            const bubble = document.createElement('div');
            bubble.className = `message-bubble ${isMe ? 'me' : ''}`;
            bubble.id = `msg-${data.id}`;

            const header = document.createElement('div');
            header.className = 'message-header';
            header.innerHTML = `<span>${escapeHTML(data.sender)}</span><span>${data.timestamp}</span>`;

            const content = document.createElement('div');
            content.className = 'message-content';

            const hasMarkdown = /[*_#`\[\]\-]/.test(data.text);
            let rawContentHTML = '';
            if (hasMarkdown) {
                rawContentHTML = DOMPurify.sanitize(marked.parse(data.text));
                content.innerHTML = rawContentHTML;
            } else {
                content.innerHTML = linkify(escapeHTML(data.text));
            }

            const actions = document.createElement('div');
            actions.className = 'bubble-actions';

            if (hasMarkdown || data.file) {
                const expandBtn = document.createElement('button');
                expandBtn.className = 'action-icon-btn';
                expandBtn.innerHTML = `<i data-lucide="maximize-2" style="width:14px;height:14px;"></i>`;
                
                if (hasMarkdown) {
                    expandBtn.onclick = () => openMarkdownFullscreen(rawContentHTML);
                } else if (data.file && data.file.type.startsWith('image/')) {
                    expandBtn.onclick = () => openImageFullscreen(data.file.url);
                }
                
                if (hasMarkdown || (data.file && data.file.type.startsWith('image/'))) {
                    actions.appendChild(expandBtn);
                }
            }

            if (data.text) {
                const copyBtn = document.createElement('button');
                copyBtn.className = 'action-icon-btn';
                copyBtn.innerHTML = `<i data-lucide="copy" style="width:14px;height:14px;"></i>`;
                copyBtn.onclick = () => copyToClipboard(data.text);
                actions.appendChild(copyBtn);
            }

            bubble.appendChild(header);
            bubble.appendChild(content);
            bubble.appendChild(actions);

            if (data.file) {
                if (data.file.type.startsWith('image/')) {
                    const img = document.createElement('img');
                    img.src = data.file.url;
                    img.className = 'attachment-preview';
                    bubble.appendChild(img);
                } else {
                    const link = document.createElement('a');
                    link.href = data.file.url;
                    link.download = data.file.name;
                    link.className = 'file-link';
                    link.innerHTML = `<i data-lucide="download" style="width:14px;height:14px;"></i> <span>${data.file.name}</span>`;
                    bubble.appendChild(link);
                }
            }

            return bubble;
        }

        function handleFileStaging(event) {
            const file = event.target.files[0];
            if (!file) return;

            stagedFileObj = file;

            const previewContainer = document.getElementById('staged-container');
            const thumb = document.getElementById('staged-img-view');
            const filename = document.getElementById('staged-file-name');

            filename.innerText = file.name;
            previewContainer.style.display = 'flex';

            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    thumb.src = e.target.result;
                    thumb.style.display = 'block';
                };
                reader.readAsDataURL(file);
            } else {
                thumb.style.display = 'none';
            }
            lucide.createIcons();
        }

        function clearStagedFile() {
            stagedFileObj = null;
            document.getElementById('file-input').value = '';
            document.getElementById('staged-container').style.display = 'none';
        }

        function handleChatSubmit(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                initiateSend();
            }
        }

        function initiateSend() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();

            if (!text && !stagedFileObj) return;

            if (stagedFileObj) {
                const formData = new FormData();
                formData.append('file', stagedFileObj);

                const xhr = new XMLHttpRequest();
                const progressOuter = document.getElementById('progress-bar-wrap');
                const progressInner = document.getElementById('progress-indicator');

                progressOuter.style.display = 'block';
                progressInner.style.width = '0%';

                xhr.upload.addEventListener('progress', (e) => {
                    if (e.lengthComputable) {
                        const percent = (e.loaded / e.total) * 100;
                        progressInner.style.width = percent + '%';
                    }
                });

                xhr.onreadystatechange = () => {
                    if (xhr.readyState === XMLHttpRequest.DONE) {
                        progressOuter.style.display = 'none';
                        if (xhr.status === 200) {
                            const response = JSON.parse(xhr.responseText);
                            socket.emit('send-message', {
                                text: text,
                                file: response
                            });
                            clearStagedFile();
                        } else {
                            alert('การอัปโหลดไฟล์ล้มเหลว');
                        }
                    }
                };

                xhr.open('POST', '/upload', true);
                xhr.send(formData);
                input.value = '';
            } else {
                socket.emit('send-message', {
                    text: text,
                    file: null
                });
                input.value = '';
            }
        }

        socket.on('chat-history', (history) => {
            const container = document.getElementById('chat-messages');
            container.innerHTML = '';
            history.forEach(data => {
                container.appendChild(renderMessage(data));
            });
            lucide.createIcons();
            scrollToBottom();
        });

        socket.on('new-message', (data) => {
            const container = document.getElementById('chat-messages');
            container.appendChild(renderMessage(data));
            lucide.createIcons();
            scrollToBottom();
        });

        socket.on('user-joined', (username) => {
            showNotification(`${username} ได้เชื่อมต่อเข้าแชท`);
        });

        socket.on('user-left', (username) => {
            showNotification(`${username} ได้ออกจากห้องแชท`);
        });

        function openImageFullscreen(src) {
            const viewer = document.getElementById('fullscreen-viewer');
            viewer.innerHTML = `<img src="${src}">`;
            document.getElementById('fullscreen-overlay').style.display = 'flex';
        }

        function openMarkdownFullscreen(htmlContent) {
            const viewer = document.getElementById('fullscreen-viewer');
            viewer.innerHTML = `<div class="fullscreen-markdown">${htmlContent}</div>`;
            document.getElementById('fullscreen-overlay').style.display = 'flex';
        }

        function closeFullscreen() {
            document.getElementById('fullscreen-overlay').style.display = 'none';
            document.getElementById('fullscreen-viewer').innerHTML = '';
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('คัดลอกข้อความแล้ว');
            });
        }

        function showNotification(text) {
            const container = document.getElementById('chat-messages');
            const notice = document.createElement('div');
            notice.className = 'system-notice';
            notice.text = text;
            notice.innerText = text;
            container.appendChild(notice);
            scrollToBottom();
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        function scrollToBottom() {
            const el = document.getElementById('chat-messages');
            el.scrollTop = el.scrollHeight;
        }
    </script>
</body>
</html>
