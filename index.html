<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game</title>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; touch-action: none; }
        #world { position: absolute; width: 3000px; height: 3000px; background: radial-gradient(#222, #000); }
        .player { position: absolute; left: 500px; top: 500px; width: 50px; height: 50px; background: #7f5af0; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .os-label { color: white; font-size: 14px; }
        #joystick { position: fixed; bottom: 30px; left: 30px; width: 120px; height: 120px; background: rgba(255,255,255,0.2); border-radius: 50%; border: 2px solid white; }
    </style>
</head>
<body>
    <div id="world">
        <div class="player"><div class="os-label" id="os">OS</div></div>
    </div>
    <div id="joystick"></div>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        document.getElementById('os').innerText = navigator.platform;
        console.log("Game Loaded");
    </script>
</body>
</html>
