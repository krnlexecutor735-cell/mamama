<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #111; overflow: hidden; touch-action: none; }
        #world { position: absolute; width: 3000px; height: 3000px; background: radial-gradient(#1a1a1a, #000); will-change: transform; }
        .player { position: absolute; width: 40px; height: 40px; background: #7f5af0; border-radius: 50%; transform: translate(-50%, -50%); transition: left 0.05s linear, top 0.05s linear; }
        .remote { background: #2cb67d; }
    </style>
</head>
<body>
    <div id="world"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const world = document.getElementById('world');
        let players = {};
        let my = { x: 1500, y: 1500, el: document.createElement('div') };
        
        my.el.className = 'player';
        world.appendChild(my.el);
        players[socket.id] = my;

        socket.on('move', (d) => {
            if(!players[d.id]) {
                let el = document.createElement('div');
                el.className = 'player remote';
                world.appendChild(el);
                players[d.id] = { el: el, x: d.x, y: d.y };
            }
            players[d.id].x = d.x;
            players[d.id].y = d.y;
            players[d.id].el.style.left = d.x + 'px';
            players[d.id].el.style.top = d.y + 'px';
        });

        socket.on('remove', (id) => {
            if(players[id]) {
                players[id].el.remove();
                delete players[id];
            }
        });

        function update() {
            my.el.style.left = my.x + 'px';
            my.el.style.top = my.y + 'px';
            world.style.transform = `translate(${window.innerWidth/2 - my.x}px, ${window.innerHeight/2 - my.y}px)`;
            requestAnimationFrame(update);
        }
        update();

        window.addEventListener('touchmove', (e) => {
            my.x += (e.touches[0].clientX - window.innerWidth/2) / 20;
            my.y += (e.touches[0].clientY - window.innerHeight/2) / 20;
            socket.emit('move', {x: my.x, y: my.y});
        });
    </script>
</body>
</html>
